version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bidops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bidops
      POSTGRES_PASSWORD: bidops_dev_password
      POSTGRES_DB: bidops_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidops -d bidops_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bidops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  redis_data:
